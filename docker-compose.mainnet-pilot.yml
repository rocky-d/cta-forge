# Mainnet pilot dry-run compose overlay. Use for mainnet wiring checks only.
# For live orders, layer docker-compose.mainnet-pilot-live.yml after this file.
# Usage:
#   docker compose -f docker-compose.prod.yml -f docker-compose.mainnet-pilot.yml up -d

services:
  executor-live:
    environment:
      HL_NETWORK: mainnet
      DRY_RUN: "true"
      STRATEGY_PROFILE: v16a-mainnet-pilot
      V16A_CORE_PHASE_HOURS: "0"
      ALLOW_MAINNET_PILOT_LIVE: "false"
      TARGET_SCALE: "1.0"
      TARGET_GROSS_CAP: "0.20"
      MIN_EQUITY: "50"
      MIN_AVAILABLE_BALANCE: "50"
      MAX_EQUITY: "200"
      MAX_ORDER_NOTIONAL: "25"
      HL_LEVERAGE: "5"
      LIVE_SYMBOLS: BTC,ETH,SOL,BNB,XRP,DOGE,AVAX,LINK,ADA,DOT,ATOM,NEAR,APT,ARB,OP,SUI,INJ,TIA,SEI
      STATE_FILE: /app/state/engine-state-mainnet-pilot.json
      JOURNAL_DIR: /app/journal/mainnet-pilot
    volumes:
      - ./state:/app/state
      - ./journal:/app/journal
