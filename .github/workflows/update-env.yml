name: Update Env

on:
  workflow_dispatch:

concurrency:
  group: cta-forge-env-update
  cancel-in-progress: false

jobs:
  update-env:
    runs-on: ubuntu-latest
    steps:
      - name: Update .env files and restart executors
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/cta-forge

            echo "Ensuring DD protection env vars..."

            for ENV_FILE in .env .env.mainnet-400-01; do
              if [ ! -f "$ENV_FILE" ]; then
                echo "  $ENV_FILE not found — skipping"
                continue
              fi
              for VAR in SOFT_DD_LIMIT=0.15 HARD_DD_LIMIT=0.30; do
                KEY="${VAR%%=*}"
                if grep -q "^$KEY=" "$ENV_FILE" 2>/dev/null; then
                  echo "  $KEY already set in $ENV_FILE"
                else
                  echo "$VAR" >> "$ENV_FILE"
                  echo "  + $KEY added to $ENV_FILE"
                fi
              done
            done

            echo ""
            echo "Restarting executor-live..."
            docker compose -f docker-compose.prod.yml stop -t 120 executor-live 2>/dev/null || true
            docker compose -f docker-compose.prod.yml rm -f executor-live 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --no-deps executor-live

            echo "Restarting executor-mainnet-400-01..."
            docker compose -f docker-compose.prod.yml --profile mainnet-400-01 stop -t 120 executor-mainnet-400-01 2>/dev/null || true
            docker compose -f docker-compose.prod.yml --profile mainnet-400-01 rm -f executor-mainnet-400-01 2>/dev/null || true
            docker compose -f docker-compose.prod.yml --profile mainnet-400-01 up -d --no-deps executor-mainnet-400-01

            sleep 15
            echo ""
            echo "=== Verification ==="
            for container in cta-forge-executor cta-forge-executor-mainnet-400-01; do
              STATUS=$(docker inspect --format='{{.State.Status}}' $container 2>/dev/null || echo "missing")
              echo "  $container: $STATUS"
            done

            echo ""
            echo "=== Env confirmation ==="
            for ENV_FILE in .env .env.mainnet-400-01; do
              if [ -f "$ENV_FILE" ]; then
                grep -E '^(SOFT_DD_LIMIT|HARD_DD_LIMIT)' "$ENV_FILE" || echo "  (none found)"
              fi
            done

            echo ""
            echo "✓ Env update complete"
