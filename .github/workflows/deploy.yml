name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: latest commit SHA)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: cta-forge-production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rocky-d/cta-forge/executor

jobs:
  check-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Wait for Lint and Test on this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for Lint and Test workflows on commit ${{ github.sha }}..."

          for i in $(seq 1 30); do
            LINT=$(gh run list --commit ${{ github.sha }} --workflow lint.yml --limit 1 --json conclusion --jq '.[0].conclusion // "pending"')
            TEST=$(gh run list --commit ${{ github.sha }} --workflow test.yml --limit 1 --json conclusion --jq '.[0].conclusion // "pending"')

            echo "Attempt $i/30: Lint=$LINT, Test=$TEST"

            if [ "$LINT" = "failure" ] || [ "$TEST" = "failure" ]; then
              echo "✗ CI failed — aborting deploy"
              exit 1
            fi

            if [ "$LINT" = "success" ] && [ "$TEST" = "success" ]; then
              echo "✓ CI passed"
              exit 0
            fi

            sleep 10
          done

          echo "✗ CI did not complete in time"
          exit 1

  build-and-push:
    needs: check-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [ -n "$TAG_INPUT" ]; then
            case "$TAG_INPUT" in
              *[!A-Za-z0-9._-]* | .* | *..* | *- )
                echo "Invalid image tag: use only A-Z, a-z, 0-9, dot, underscore, and dash; do not start with dot or end with dash."
                exit 1
                ;;
            esac
            echo "tag=$TAG_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push executor image
        run: |
          docker build --target executor \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Check tick-safe deploy window
        run: |
          MINUTE=$(date -u +%M)
          MINUTE_NUM=$((10#$MINUTE))
          if [ "$MINUTE_NUM" -ge 15 ] && [ "$MINUTE_NUM" -le 45 ]; then
            echo "✓ Safe deploy window (UTC xx:${MINUTE}, tick has completed)"
          else
            echo "✗ Unsafe deploy window (UTC xx:${MINUTE})"
            echo "Deploy only between xx:15 and xx:45 UTC."
            echo "Retry this workflow within the window."
            exit 1
          fi

      - name: Sync compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ~/cta-forge/

      - name: Deploy all executor instances to EC2
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -euo pipefail
            cd ~/cta-forge
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u rocky-d --password-stdin
            COMPOSE_FILES="-f docker-compose.prod.yml"

            echo "Pulling all images (default + mainnet-400-01 profile)..."
            docker compose $COMPOSE_FILES --profile mainnet-400-01 pull

            echo "Starting local PostgreSQL container..."
            docker compose $COMPOSE_FILES up -d postgres

            echo "Applying live persistence migrations..."
            docker compose $COMPOSE_FILES --profile db-maintenance run --rm db-migrate >/tmp/live-persistence-migrate.json
            echo "✓ Live persistence migrations applied"

            echo "Running preflight for mainnet-pilot..."
            if ! docker compose $COMPOSE_FILES run --rm --no-deps \
              executor-live uv run python -m executor.run_mainnet_preflight >/tmp/mainnet-preflight-pilot.json; then
              echo "✗ Pilot preflight failed"
              echo "Preflight details are intentionally not printed to public GitHub logs. Inspect /tmp/mainnet-preflight-pilot.json on the deployment host."
              exit 1
            fi
            echo "✓ Pilot preflight passed"

            echo "Running preflight for mainnet-400-01..."
            docker compose $COMPOSE_FILES --profile mainnet-400-01 run --rm --no-deps \
              executor-mainnet-400-01 uv run python -m executor.run_mainnet_preflight >/tmp/mainnet-preflight-400-01.json || \
              echo "⚠ 400-01 preflight non-blocking (DRY_RUN mode); inspect /tmp/mainnet-preflight-400-01.json if needed"

            echo "Restarting all executor instances..."
            docker compose $COMPOSE_FILES up -d --no-deps --force-recreate executor-live
            docker compose $COMPOSE_FILES --profile mainnet-400-01 up -d --no-deps --force-recreate executor-mainnet-400-01

            docker image prune -f
            echo "✓ All executor instances restarted"

      - name: Verify both executor instances
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/cta-forge
            sleep 15

            echo "--- mainnet-pilot ---"
            STATUS=$(docker inspect --format='{{.State.Status}}' cta-forge-executor 2>/dev/null || echo "missing")
            echo "Container status: $STATUS"
            if [ "$STATUS" != "running" ]; then
              echo "✗ Pilot container not running"
              exit 1
            fi
            ENV_DUMP=$(docker inspect cta-forge-executor --format '{{range .Config.Env}}{{println .}}{{end}}')
            printf '%s\n' "$ENV_DUMP" | grep -q '^HL_NETWORK=mainnet$'
            printf '%s\n' "$ENV_DUMP" | grep -q '^DRY_RUN=false$'
            printf '%s\n' "$ENV_DUMP" | grep -q '^STRATEGY_PROFILE=v16a-mainnet-pilot$'
            printf '%s\n' "$ENV_DUMP" | grep -q '^ALLOW_LIVE=true$'
            echo "✓ Pilot guard flags verified"

            if ! docker exec cta-forge-executor uv run python -m executor.run_mainnet_preflight >/tmp/mainnet-preflight-pilot.json; then
              echo "✗ Pilot post-deploy preflight failed"
              exit 1
            fi
            echo "✓ Pilot post-deploy preflight passed"

            if docker logs cta-forge-executor 2>&1 | grep -q "Preflight PASSED"; then
              echo "✓ Pilot LiveEngine started successfully"
            elif docker logs cta-forge-executor 2>&1 | grep -q "Waiting.*until next candle"; then
              echo "✓ Pilot LiveEngine started, waiting for next tick"
            else
              echo "⚠ Pilot startup not confirmed yet; inspect host logs"
            fi

            echo "--- mainnet-400-01 ---"
            STATUS_400=$(docker inspect --format='{{.State.Status}}' cta-forge-executor-mainnet-400-01 2>/dev/null || echo "missing")
            echo "Container status: $STATUS_400"
            if [ "$STATUS_400" != "running" ]; then
              echo "✗ 400-01 container not running"
              exit 1
            fi
            ENV_DUMP_400=$(docker inspect cta-forge-executor-mainnet-400-01 --format '{{range .Config.Env}}{{println .}}{{end}}')
            printf '%s\n' "$ENV_DUMP_400" | grep -q '^HL_NETWORK=mainnet$'
            printf '%s\n' "$ENV_DUMP_400" | grep -q '^DRY_RUN=true$'
            printf '%s\n' "$ENV_DUMP_400" | grep -q '^STRATEGY_PROFILE=v16a-mainnet-pilot$'
            printf '%s\n' "$ENV_DUMP_400" | grep -q '^ALLOW_LIVE=false$'
            echo "✓ 400-01 guard flags verified"

            if docker logs cta-forge-executor-mainnet-400-01 2>&1 | grep -q "Preflight PASSED"; then
              echo "✓ 400-01 LiveEngine started successfully"
            elif docker logs cta-forge-executor-mainnet-400-01 2>&1 | grep -q "Waiting.*until next candle"; then
              echo "✓ 400-01 LiveEngine started, waiting for next tick"
            else
              echo "⚠ 400-01 startup not confirmed yet; inspect host logs"
            fi

            echo "✓ Deployment verified: both executor instances healthy"
