name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: latest commit SHA)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: cta-forge-production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rocky-d/cta-forge/executor

jobs:
  check-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Wait for CI workflows to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for Lint and Test workflows on commit ${{ github.sha }}..."

          for i in $(seq 1 30); do
            LINT_STATUS=$(gh run list --commit ${{ github.sha }} --workflow lint.yml --limit 1 --json conclusion --jq '.[0].conclusion // "pending"')
            TEST_STATUS=$(gh run list --commit ${{ github.sha }} --workflow test.yml --limit 1 --json conclusion --jq '.[0].conclusion // "pending"')

            echo "Attempt $i/30: Lint=$LINT_STATUS, Test=$TEST_STATUS"

            if [ "$LINT_STATUS" = "failure" ] || [ "$TEST_STATUS" = "failure" ]; then
              echo "✗ CI failed — aborting deploy"
              exit 1
            fi

            if [ "$LINT_STATUS" = "success" ] && [ "$TEST_STATUS" = "success" ]; then
              echo "✓ CI passed"
              exit 0
            fi

            sleep 10
          done

          echo "✗ CI did not complete in time"
          exit 1

  build-and-push:
    needs: check-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          if [ -n "$TAG_INPUT" ]; then
            case "$TAG_INPUT" in
              *[!A-Za-z0-9._-]* | .* | *..* | *- )
                echo "Invalid image tag: use only A-Z, a-z, 0-9, dot, underscore, and dash; do not start with dot or end with dash."
                exit 1
                ;;
            esac
            echo "tag=$TAG_INPUT" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push executor image
        run: |
          docker build --target executor \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Sync compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ~/cta-forge/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -euo pipefail
            cd ~/cta-forge
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u rocky-d --password-stdin
            COMPOSE_FILES="-f docker-compose.prod.yml"
            docker compose $COMPOSE_FILES pull
            echo "Starting local PostgreSQL container..."
            docker compose $COMPOSE_FILES up -d postgres
            echo "Applying live persistence migrations..."
            docker compose $COMPOSE_FILES --profile db-maintenance run --rm db-migrate >/tmp/live-persistence-migrate.json
            echo "✓ Live persistence migrations applied"
            echo "Running pre-start strict mainnet pilot preflight..."
            if ! docker compose $COMPOSE_FILES run --rm --no-deps \
              executor-live uv run python -m executor.run_mainnet_preflight >/tmp/mainnet-preflight.json; then
              echo "✗ Pre-start mainnet pilot preflight failed"
              echo "Preflight details are intentionally not printed to public GitHub logs. Inspect /tmp/mainnet-preflight.json on the deployment host."
              exit 1
            fi
            echo "✓ Pre-start mainnet pilot preflight passed"
            docker compose $COMPOSE_FILES up -d --no-deps --force-recreate executor-live
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/cta-forge
            sleep 15
            STATUS=$(docker inspect --format='{{.State.Status}}' cta-forge-executor 2>/dev/null || echo "missing")
            echo "Container status: $STATUS"
            if [ "$STATUS" != "running" ]; then
              echo "✗ Container not running. Inspect host logs directly; they are not printed to public CI logs."
              exit 1
            fi
            ENV_DUMP=$(docker inspect cta-forge-executor --format '{{range .Config.Env}}{{println .}}{{end}}')
            printf '%s\n' "$ENV_DUMP" | grep -q '^HL_NETWORK=mainnet$'
            printf '%s\n' "$ENV_DUMP" | grep -q '^DRY_RUN=false$'
            printf '%s\n' "$ENV_DUMP" | grep -q '^STRATEGY_PROFILE=v16a-mainnet-pilot$'
            printf '%s\n' "$ENV_DUMP" | grep -q '^ALLOW_MAINNET_PILOT_LIVE=true$'
            echo "✓ Required deployment guard flags verified"
            echo "Running strict mainnet pilot preflight..."
            if ! docker exec cta-forge-executor uv run python -m executor.run_mainnet_preflight >/tmp/mainnet-preflight.json; then
              echo "✗ Mainnet pilot preflight failed"
              echo "Preflight details are intentionally not printed to public GitHub logs. Inspect /tmp/mainnet-preflight.json on the deployment host."
              exit 1
            fi
            echo "✓ Mainnet pilot preflight passed"
            if docker logs cta-forge-executor 2>&1 | grep -q "Preflight PASSED"; then
              echo "✓ LiveEngine started successfully"
            elif docker logs cta-forge-executor 2>&1 | grep -q "Waiting.*until next candle"; then
              echo "✓ LiveEngine started, waiting for next tick"
            else
              echo "⚠ LiveEngine startup not confirmed yet. Inspect host logs directly; they are not printed to public CI logs."
            fi
