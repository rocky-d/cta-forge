name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: latest commit SHA)"
        required: false
        default: ""
      target:
        description: "Deployment target"
        required: true
        default: "testnet-live"
        type: choice
        options:
          - testnet-live
          - mainnet-pilot-dry-run
          - mainnet-pilot-live

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rocky-d/cta-forge/executor

jobs:
  # Gate: ensure CI passed on this commit before deploying
  check-ci:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Wait for CI workflows to complete
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for Lint and Test workflows on commit ${{ github.sha }}..."

          for i in $(seq 1 30); do
            LINT_STATUS=$(gh run list --commit ${{ github.sha }} --workflow lint.yml --limit 1 --json conclusion --jq '.[0].conclusion // "pending"')
            TEST_STATUS=$(gh run list --commit ${{ github.sha }} --workflow test.yml --limit 1 --json conclusion --jq '.[0].conclusion // "pending"')

            echo "Attempt $i/30: Lint=$LINT_STATUS, Test=$TEST_STATUS"

            if [ "$LINT_STATUS" = "failure" ] || [ "$TEST_STATUS" = "failure" ]; then
              echo "✗ CI failed — aborting deploy"
              exit 1
            fi

            if [ "$LINT_STATUS" = "success" ] && [ "$TEST_STATUS" = "success" ]; then
              echo "✓ CI passed"
              exit 0
            fi

            sleep 10
          done

          echo "✗ CI did not complete in time"
          exit 1

  build-and-push:
    needs: check-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push executor image
        run: |
          docker build --target executor \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Resolve compose files
        id: compose
        run: |
          if [ "${{ inputs.target }}" = "mainnet-pilot-live" ]; then
            echo "source=docker-compose.prod.yml,docker-compose.mainnet-pilot.yml,docker-compose.mainnet-pilot-live.yml" >> "$GITHUB_OUTPUT"
            echo "files=-f docker-compose.prod.yml -f docker-compose.mainnet-pilot.yml -f docker-compose.mainnet-pilot-live.yml" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.target }}" = "mainnet-pilot-dry-run" ]; then
            echo "source=docker-compose.prod.yml,docker-compose.mainnet-pilot.yml" >> "$GITHUB_OUTPUT"
            echo "files=-f docker-compose.prod.yml -f docker-compose.mainnet-pilot.yml" >> "$GITHUB_OUTPUT"
          else
            echo "source=docker-compose.prod.yml" >> "$GITHUB_OUTPUT"
            echo "files=-f docker-compose.prod.yml" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: ${{ steps.compose.outputs.source }}
          target: ~/cta-forge/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cta-forge
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u rocky-d --password-stdin
            COMPOSE_FILES="${{ steps.compose.outputs.files }}"
            echo "Deploy target: ${{ inputs.target }}"
            echo "Compose files: $COMPOSE_FILES"
            docker compose $COMPOSE_FILES pull
            # Graceful shutdown: give live engine time to finish any in-flight tick
            docker compose $COMPOSE_FILES stop -t 30
            docker compose $COMPOSE_FILES down --remove-orphans
            docker compose $COMPOSE_FILES up -d
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cta-forge
            sleep 15
            # Check container is running (not restarting)
            STATUS=$(docker inspect --format='{{.State.Status}}' cta-forge-executor 2>/dev/null || echo "missing")
            echo "Container status: $STATUS"
            if [ "$STATUS" != "running" ]; then
              echo "✗ Container not running!"
              docker logs cta-forge-executor --tail 20 2>&1
              exit 1
            fi
            echo "Expected deploy target: ${{ inputs.target }}"
            docker inspect cta-forge-executor --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -E '^(HL_NETWORK|DRY_RUN|STRATEGY_PROFILE|ALLOW_MAINNET_PILOT_LIVE|TARGET_SCALE|TARGET_GROSS_CAP|MAX_ORDER_NOTIONAL|HL_LEVERAGE|STATE_FILE|JOURNAL_DIR|TG_CHAT_ID)=' | sort
            if [ "${{ inputs.target }}" = "mainnet-pilot-dry-run" ] || [ "${{ inputs.target }}" = "mainnet-pilot-live" ]; then
              docker inspect cta-forge-executor --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -q '^HL_NETWORK=mainnet$'
              docker inspect cta-forge-executor --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -q '^STRATEGY_PROFILE=v16a-mainnet-pilot$'
            fi
            if [ "${{ inputs.target }}" = "mainnet-pilot-dry-run" ]; then
              docker inspect cta-forge-executor --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -q '^DRY_RUN=true$'
            fi
            if [ "${{ inputs.target }}" = "mainnet-pilot-live" ]; then
              docker inspect cta-forge-executor --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -q '^DRY_RUN=false$'
              docker inspect cta-forge-executor --format '{{range .Config.Env}}{{println .}}{{end}}' | grep -q '^ALLOW_MAINNET_PILOT_LIVE=true$'
            fi
            if [ "${{ inputs.target }}" = "mainnet-pilot-dry-run" ] || [ "${{ inputs.target }}" = "mainnet-pilot-live" ]; then
              echo "Running strict mainnet pilot preflight..."
              if ! docker exec cta-forge-executor uv run python -m executor.run_mainnet_preflight >/tmp/mainnet-preflight.json; then
                echo "✗ Mainnet pilot preflight failed"
                cat /tmp/mainnet-preflight.json
                exit 1
              fi
              cat /tmp/mainnet-preflight.json
              echo "✓ Mainnet pilot preflight passed"
            fi
            # Check for LiveEngine startup in logs
            if docker logs cta-forge-executor 2>&1 | grep -q "Preflight PASSED"; then
              echo "✓ LiveEngine started successfully"
            elif docker logs cta-forge-executor 2>&1 | grep -q "Waiting.*until next candle"; then
              echo "✓ LiveEngine started, waiting for next tick"
            else
              echo "⚠ LiveEngine startup not confirmed yet (may still be initializing)"
              docker logs cta-forge-executor --tail 10 2>&1
            fi
