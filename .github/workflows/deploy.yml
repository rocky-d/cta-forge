name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: latest commit SHA)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rocky-d/cta-forge/executor

jobs:
  # Gate: ensure CI passed on this commit before deploying
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Verify lint and test passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e  # Don't exit on error, we handle it ourselves
          SHA=${{ github.sha }}
          echo "Checking CI status for $SHA..."

          for i in $(seq 1 30); do
            echo "Attempt $i/30..."

            # Query check runs
            RESPONSE=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" 2>&1)
            if [ $? -ne 0 ]; then
              echo "  API call failed, retrying..."
              sleep 10
              continue
            fi

            # Parse results
            RUFF_FMT=$(echo "$RESPONSE" | jq -r '.check_runs[] | select(.name == "ruff-format") | .conclusion // "pending"')
            RUFF_CHK=$(echo "$RESPONSE" | jq -r '.check_runs[] | select(.name == "ruff-check") | .conclusion // "pending"')
            TYPE_CHK=$(echo "$RESPONSE" | jq -r '.check_runs[] | select(.name == "type-check") | .conclusion // "pending"')
            TEST=$(echo "$RESPONSE" | jq -r '.check_runs[] | select(.name == "test") | .conclusion // "pending"')

            # Default empty to pending
            RUFF_FMT=${RUFF_FMT:-pending}
            RUFF_CHK=${RUFF_CHK:-pending}
            TYPE_CHK=${TYPE_CHK:-pending}
            TEST=${TEST:-pending}

            echo "  ruff-format=$RUFF_FMT ruff-check=$RUFF_CHK type-check=$TYPE_CHK test=$TEST"

            # Fail fast if any failed
            if [ "$RUFF_FMT" = "failure" ] || [ "$RUFF_CHK" = "failure" ] || \
               [ "$TYPE_CHK" = "failure" ] || [ "$TEST" = "failure" ]; then
              echo "âś— CI FAILED â€” aborting deploy"
              exit 1
            fi

            # Pass if all four succeeded
            if [ "$RUFF_FMT" = "success" ] && [ "$RUFF_CHK" = "success" ] && \
               [ "$TYPE_CHK" = "success" ] && [ "$TEST" = "success" ]; then
              echo "âś“ All CI checks passed"
              exit 0
            fi

            sleep 10
          done

          echo "âś— CI did not complete within 5 minutes â€” aborting"
          exit 1

  build-and-push:
    needs: check-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push executor image
        run: |
          docker build --target executor \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cta-forge
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u rocky-d --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
