name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (default: latest commit SHA)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rocky-d/cta-forge/executor

jobs:
  # Gate: ensure CI passed on this commit before deploying
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Verify lint and test passed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=${{ github.sha }}
          echo "Checking CI status for $SHA..."

          # Wait up to 5 minutes for CI to complete
          for i in $(seq 1 30); do
            LINT=$(gh api repos/${{ github.repository }}/commits/$SHA/check-runs \
              --jq '.check_runs[] | select(.name | test("ruff|ty|lint"; "i")) | .conclusion' 2>/dev/null | head -1)
            TEST=$(gh api repos/${{ github.repository }}/commits/$SHA/check-runs \
              --jq '.check_runs[] | select(.name | test("test|pytest"; "i")) | .conclusion' 2>/dev/null | head -1)

            if [ "$LINT" = "success" ] && [ "$TEST" = "success" ]; then
              echo "✓ Lint: $LINT, Test: $TEST — CI passed"
              exit 0
            elif [ "$LINT" = "failure" ] || [ "$TEST" = "failure" ]; then
              echo "✗ Lint: $LINT, Test: $TEST — CI FAILED, aborting deploy"
              exit 1
            fi

            echo "Waiting for CI... (attempt $i/30, lint=$LINT, test=$TEST)"
            sleep 10
          done

          echo "✗ CI did not complete within 5 minutes — aborting"
          exit 1

  build-and-push:
    needs: check-ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push executor image
        run: |
          docker build --target executor \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cta-forge
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u rocky-d --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
