# Production compose: live trading engine only, pulls from GHCR.
# Current rollout: guarded v16a Hyperliquid testnet-live observation.
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  executor-live:
    image: ghcr.io/rocky-d/cta-forge/executor:latest
    container_name: cta-forge-executor
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "executor.run_live"]
    env_file: .env
    environment:
      # Non-secret promotion flags. Secrets and notification endpoints stay in .env.
      HL_NETWORK: testnet
      DRY_RUN: "false"
      STRATEGY_PROFILE: v16a-badscore-overlay
      ALLOW_V16A_TESTNET_LIVE: "true"
    volumes:
      - ./data:/app/data
      - ./engine-state.json:/app/engine-state.json
      - ./journal:/app/journal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
