# Production compose: live engine structure only.
# Secrets and runtime settings are supplied by the private deployment .env.

services:
  executor-live:
    image: ghcr.io/rocky-d/cta-forge/executor:latest
    container_name: cta-forge-executor
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "executor.run_live"]
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./journal:/app/journal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
