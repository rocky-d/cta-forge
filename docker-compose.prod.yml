# Production compose: guarded mainnet pilot live engine only.
# Secrets and notification endpoints are supplied by the private deployment .env.

services:
  executor-live:
    image: ghcr.io/rocky-d/cta-forge/executor:latest
    container_name: cta-forge-executor
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "executor.run_live"]
    env_file: .env
    environment:
      HL_NETWORK: mainnet
      DRY_RUN: "false"
      STRATEGY_PROFILE: v16a-mainnet-pilot
      V16A_CORE_PHASE_HOURS: "2"
      ALLOW_MAINNET_PILOT_LIVE: "true"
      TARGET_SCALE: "5.0"
      TARGET_GROSS_CAP: "4.00"
      MIN_EQUITY: "50"
      MIN_AVAILABLE_BALANCE: "0"
      MAX_EQUITY: "200"
      MAX_ORDER_NOTIONAL: ""
      ALLOW_MAINNET_PILOT_UNCAPPED_ORDERS: "true"
      HL_LEVERAGE: "5"
      LIVE_SYMBOLS: BTC,ETH,SOL,BNB,XRP,DOGE,AVAX,LINK,ADA,DOT,ATOM,NEAR,APT,ARB,OP,SUI,INJ,TIA,SEI
      STATE_FILE: /app/state/engine-state-mainnet-pilot.json
      JOURNAL_DIR: /app/journal/mainnet-pilot
    volumes:
      - ./data:/app/data
      - ./state:/app/state
      - ./journal:/app/journal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
