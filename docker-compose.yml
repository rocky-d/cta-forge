services:
  data-service:
    build:
      context: .
      dockerfile: services/data-service/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data

  alpha-service:
    build:
      context: .
      dockerfile: services/alpha-service/Dockerfile
    ports:
      - "8002:8002"

  strategy-service:
    build:
      context: .
      dockerfile: services/strategy-service/Dockerfile
    ports:
      - "8003:8003"

  executor:
    build:
      context: .
      dockerfile: services/executor/Dockerfile
    ports:
      - "8004:8004"
    depends_on:
      - data-service
      - alpha-service
      - strategy-service
    environment:
      - DATA_SERVICE_URL=http://data-service:8001
      - ALPHA_SERVICE_URL=http://alpha-service:8002
      - STRATEGY_SERVICE_URL=http://strategy-service:8003
      - REPORT_SERVICE_URL=http://report-service:8005

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    ports:
      - "8005:8005"
