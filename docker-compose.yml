# Local development / full-stack demo compose.
# Usage:
#   docker compose up                    # all API services (no live engine)
#   docker compose --profile live up     # + live trading engine

services:
  data-service:
    build:
      context: .
      target: data-service
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    environment:
      DATA_DIR: /app/data

  alpha-service:
    build:
      context: .
      target: alpha-service
    ports:
      - "8002:8002"

  strategy-service:
    build:
      context: .
      target: strategy-service
    ports:
      - "8003:8003"

  executor-api:
    build:
      context: .
      target: executor
    ports:
      - "8004:8004"
    env_file: .env
    depends_on:
      - data-service
      - strategy-service
    environment:
      DATA_SERVICE_URL: http://data-service:8001
      STRATEGY_SERVICE_URL: http://strategy-service:8003
      REPORT_SERVICE_URL: http://report-service:8005

  executor-live:
    build:
      context: .
      target: executor
    command: ["uv", "run", "python", "-m", "executor.run_live"]
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./engine-state.json:/app/engine-state.json
      - ./journal:/app/journal
    profiles:
      - live

  report-service:
    build:
      context: .
      target: report-service
    ports:
      - "8005:8005"
